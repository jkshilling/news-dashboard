<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google Tag Manager → apex GA4 (GTM-WHFLGC9S) -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-WHFLGC9S');</script>
  <!-- End Google Tag Manager -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AK Ledger{% endblock %}</title>
  <meta name="description" content="{% block description %}Alaska news tracked by topic — headlines, sources, and context organized by issue.{% endblock %}" />
  <link rel="canonical" href="https://news.alaskatargeting.com{{ request.url.path }}" />
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"WebSite","name":"AK Ledger","url":"https://news.alaskatargeting.com/"}</script>
  <meta property="og:title" content="{% block og_title %}AK Ledger{% endblock %}" />
  <meta property="og:description" content="{% block og_description %}Alaska news, tracked by topic.{% endblock %}" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://akledger.com" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="stylesheet" href="/static/css/styles.css" />
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js" defer></script>
</head>
<body>
  <header class="site-header">
    <nav class="nav-inner">
      <a href="/" class="site-brand">AK Ledger</a>
      <div class="nav-links">
        <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Coverage</a>
        <a href="/status" class="nav-link {% if request.url.path == '/status' %}active{% endif %}">Status</a>
      </div>
    </nav>
  </header>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <span>AK Ledger &mdash; Alaska news intelligence</span>
    <span> &middot; <a href="https://alaskajobs.org/">Alaska employment listings</a></span>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
