<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}News Intel Dashboard{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="stylesheet" href="/static/css/styles.css" />
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js" defer></script>
</head>
<body>
  <header class="site-header">
    <nav class="nav-inner">
      <a href="/" class="site-brand">INTEL</a>
      <div class="nav-links">
        <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Coverage</a>
        <a href="/status" class="nav-link {% if request.url.path == '/status' %}active{% endif %}">Status</a>
      </div>
    </nav>
  </header>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <span>Local intelligence feed &mdash; data is current-state only</span>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
