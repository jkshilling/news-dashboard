<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="5" fill="#0d1117"/>
  <!-- Left lens -->
  <circle cx="10" cy="18" r="6.5" fill="#162030" stroke="#5b8fc7" stroke-width="2"/>
  <circle cx="8.5" cy="16.5" r="2" fill="none" stroke="#7ab3d4" stroke-width="0.7" opacity="0.5"/>
  <!-- Right lens -->
  <circle cx="22" cy="18" r="6.5" fill="#162030" stroke="#5b8fc7" stroke-width="2"/>
  <circle cx="20.5" cy="16.5" r="2" fill="none" stroke="#7ab3d4" stroke-width="0.7" opacity="0.5"/>
  <!-- Bridge connecting the two lenses -->
  <path d="M 16.5,16 Q 16,14 15.5,16" fill="none" stroke="#5b8fc7" stroke-width="2" stroke-linecap="round"/>
</svg>
