# Optional Docker Compose configuration.
# The app is designed to run locally without Docker.
# This file is provided for reference and future containerization.
#
# Usage:
#   docker compose -f docker-compose.optional.yml up --build
#
# Notes:
#   - The data/ directory is mounted as a volume to persist the SQLite database.
#   - Set OPENAI_API_KEY in a .env file at project root before running.
#   - For production, replace SQLite with a proper database and run behind a reverse proxy.

version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.optional
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
      - ./outputs:/app/outputs
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/data/app.db
      - APP_ENV=production
    restart: unless-stopped

